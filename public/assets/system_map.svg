<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-label="System map: Graph to Path to Projects to Income">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#27d0a0" stop-opacity="0.35"/>
      <stop offset="0.5" stop-color="#f1c66a" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#ff6a3d" stop-opacity="0.22"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000" flood-opacity="0.45"/>
    </filter>
    <style>
      .bg { fill: rgba(0,0,0,0); }
      .card { fill: rgba(0,0,0,0.35); stroke: rgba(232,236,245,0.18); stroke-width: 2; filter:url(#shadow); }
      .k { font: 700 18px 'Space Grotesk', system-ui, sans-serif; fill: rgba(232,236,245,0.78); letter-spacing: 2px; text-transform: uppercase; }
      .t { font: 800 34px 'Space Grotesk', system-ui, sans-serif; fill: rgba(232,236,245,0.95); }
      .d { font: 500 18px 'IBM Plex Serif', Georgia, serif; fill: rgba(232,236,245,0.78); }
      .a { stroke: rgba(232,236,245,0.22); stroke-width: 4; fill: none; }
      .dot { fill: rgba(241,198,106,0.9); }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1200" height="420"/>
  <rect x="40" y="40" width="1120" height="340" rx="26" fill="url(#g)" opacity="0.55"/>

  <!-- Cards -->
  <g transform="translate(70,90)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="22"/>
    <text class="k" x="22" y="54">MAP</text>
    <text class="t" x="22" y="105">Graph</text>
    <text class="d" x="22" y="150">Occupations</text>
    <text class="d" x="22" y="178">Tools · Tech</text>
    <text class="d" x="22" y="206">Industries</text>
  </g>

  <g transform="translate(350,90)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="22"/>
    <text class="k" x="22" y="54">PATH</text>
    <text class="t" x="22" y="105">Tree</text>
    <text class="d" x="22" y="150">Foundations</text>
    <text class="d" x="22" y="178">Branches</text>
    <text class="d" x="22" y="206">Milestones</text>
  </g>

  <g transform="translate(630,90)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="22"/>
    <text class="k" x="22" y="54">PROOF</text>
    <text class="t" x="22" y="105">Projects</text>
    <text class="d" x="22" y="150">Demos</text>
    <text class="d" x="22" y="178">Diagrams</text>
    <text class="d" x="22" y="206">Write‑ups</text>
  </g>

  <g transform="translate(910,90)">
    <rect class="card" x="0" y="0" width="250" height="240" rx="22"/>
    <text class="k" x="22" y="54">OUTCOME</text>
    <text class="t" x="22" y="105">Income</text>
    <text class="d" x="22" y="150">Freelance</text>
    <text class="d" x="22" y="178">Consulting</text>
    <text class="d" x="22" y="206">Products</text>
  </g>

  <!-- Arrows -->
  <path class="a" d="M 330 210 C 350 210, 350 210, 350 210"/>
  <path class="a" d="M 330 210 C 340 210, 342 210, 350 210"/>

  <path class="a" d="M 610 210 C 620 210, 622 210, 630 210"/>
  <path class="a" d="M 890 210 C 900 210, 902 210, 910 210"/>

  <circle class="dot" cx="340" cy="210" r="6"/>
  <circle class="dot" cx="620" cy="210" r="6"/>
  <circle class="dot" cx="900" cy="210" r="6"/>

  <text class="d" x="70" y="68">Field → Role → Skills → Tools → Projects → Income</text>
</svg>

